name: saurav_portfolio
description: "Saurav Rana's personal portfolio — Flutter Web with GetX & Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.9.0
  get_storage: ^2.1.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  logger: ^2.5.0
  url_launcher: ^6.3.1
  json_annotation: ^4.9.0
  font_awesome_flutter: ^10.9.0
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/pubmeme/
    - assets/data/
  fonts:
    - family: FontAwesomeRegular
      fonts:
        - asset: assets/fonts/fa-regular-400.ttf
    - family: FontAwesomeSolid
      fonts:
        - asset: assets/fonts/fa-solid-900.ttf
    - family: FontAwesomeLight
      fonts:
        - asset: assets/fonts/fa-light-300.ttf
    - family: FontAwesomeBrands
      fonts:
        - asset: assets/fonts/fa-brands-400.ttf
